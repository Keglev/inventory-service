get:
  tags:
    - Inventory
  summary: Search inventory items
  description: |
    Server-side search over ACTIVE inventory items with pagination and sorting.
    All filters are optional: an empty name matches all active items. Sorting is
    fully honored via the sort parameter (no hardcoded ordering); the server-computed
    totalValue field is not sortable.

    **Security:** Requires authentication OR demo mode enabled (APP_DEMO_READONLY=true
    permits unauthenticated read access).
  operationId: searchInventoryItems
  security:
    - oauth2: [openid]
    - {}  # Empty security allows demo mode unauthenticated access
  parameters:
    - name: name
      in: query
      required: false
      description: Case-insensitive name substring; empty or absent matches all active items
      schema:
        type: string
        default: ""
      example: "widget"
    - name: supplierId
      in: query
      required: false
      description: Restrict results to a single supplier
      schema:
        type: string
      example: "supplier-123"
    - name: belowMinimumOnly
      in: query
      required: false
      description: When true, return only items whose quantity is below their minimum quantity
      schema:
        type: boolean
        default: false
    - $ref: '../../parameters/common.yaml#/components/parameters/page'
    - $ref: '../../parameters/common.yaml#/components/parameters/size'
    - $ref: '../../parameters/common.yaml#/components/parameters/sort'
  responses:
    '200':
      description: Paginated search results (default page size 20, default sort price)
      content:
        application/json:
          schema:
            $ref: '../../schemas/inventory/inventory-item.yaml#/components/schemas/InventoryItemPageResponse'
    '401':
      $ref: '../../responses/errors.yaml#/components/responses/Unauthorized'
    '500':
      $ref: '../../responses/errors.yaml#/components/responses/InternalServerError'
