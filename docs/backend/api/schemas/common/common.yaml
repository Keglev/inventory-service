components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
        - message
        - timestamp
      properties:
        error:
          type: string
          description: Normalized HTTP status token — HttpStatus.name().toLowerCase()
          example: not_found
        message:
          type: string
          description: Human-readable error message (sanitized)
          example: Resource not found
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the error occurred
          example: '2026-07-09T10:30:00Z'
        fieldErrors:
          type: object
          additionalProperties:
            type: string
          description: Optional map of field name to field-specific message; present only on validation failures
          example:
            name: must not be blank
            price: must be greater than 0
      description: |
        Canonical error envelope used by every endpoint. Exactly three fields plus
        an optional fieldErrors map. There is no correlationId, status, or path field.

    PageMetadata:
      type: object
      required:
        - page
        - size
        - totalElements
        - totalPages
      properties:
        page:
          type: integer
          minimum: 0
          description: Current page number (0-indexed)
          example: 0
        size:
          type: integer
          minimum: 1
          maximum: 100
          description: Number of items per page
          example: 20
        totalElements:
          type: integer
          minimum: 0
          description: Total number of items across all pages
          example: 150
        totalPages:
          type: integer
          minimum: 0
          description: Total number of pages
          example: 8
      description: Pagination metadata for list responses
