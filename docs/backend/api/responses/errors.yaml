components:
  responses:
    Unauthorized:
      description: Unauthorized - Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: '../schemas/common/common.yaml#/components/schemas/ErrorResponse'
          example:
            error: unauthorized
            message: No authentication provided
            timestamp: '2026-07-09T10:30:00Z'

    Forbidden:
      description: Forbidden - User lacks required permissions
      content:
        application/json:
          schema:
            $ref: '../schemas/common/common.yaml#/components/schemas/ErrorResponse'
          example:
            error: forbidden
            message: Access denied
            timestamp: '2026-07-09T10:30:00Z'

    NotFound:
      description: Not Found - Requested resource does not exist
      content:
        application/json:
          schema:
            $ref: '../schemas/common/common.yaml#/components/schemas/ErrorResponse'
          example:
            error: not_found
            message: Resource not found
            timestamp: '2026-07-09T10:30:00Z'

    ValidationError:
      description: Bad Request - Validation failed
      content:
        application/json:
          schema:
            $ref: '../schemas/common/common.yaml#/components/schemas/ErrorResponse'
          example:
            error: bad_request
            message: Validation failed
            timestamp: '2026-07-09T10:30:00Z'
            fieldErrors:
              name: must not be blank
              price: must be greater than 0

    Conflict:
      description: Conflict - Duplicate resource or business-rule violation
      content:
        application/json:
          schema:
            $ref: '../schemas/common/common.yaml#/components/schemas/ErrorResponse'
          example:
            error: conflict
            message: Item already exists with same name and price
            timestamp: '2026-07-09T10:30:00Z'

    InternalServerError:
      description: Internal Server Error - Unexpected server error occurred
      content:
        application/json:
          schema:
            $ref: '../schemas/common/common.yaml#/components/schemas/ErrorResponse'
          example:
            error: internal_server_error
            message: An unexpected error occurred
            timestamp: '2026-07-09T10:30:00Z'
