# =============================================================================
# Smart Supply Pro – Backend Build & Test
#
# Compiles, tests, and generates JaCoCo coverage for the backend service.
# On success, triggers: 2-docker-backend.yml (image build and scan).
# =============================================================================
name: 1 Backend CI - Build & Test

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'inventory-service/src/**'
      - 'inventory-service/pom.xml'
      - 'inventory-service/mvnw'
      - 'inventory-service/mvnw.cmd'
      - 'inventory-service/.mvn/**'
      - 'src/**'
      - 'pom.xml'
      - 'mvnw'
      - 'mvnw.cmd'
      - '.mvn/**'
      - '.github/workflows/1-ci-backend.yml'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'inventory-service/src/**'
      - 'inventory-service/pom.xml'
      - 'inventory-service/mvnw'
      - 'inventory-service/mvnw.cmd'
      - 'inventory-service/.mvn/**'
      - 'src/**'
      - 'pom.xml'
      - 'mvnw'
      - 'mvnw.cmd'
      - '.mvn/**'
      - '.github/workflows/1-ci-backend.yml'
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Supports both monorepo (inventory-service/pom.xml) and flat (pom.xml) layouts
      - name: Resolve backend directory
        run: |
          set -euo pipefail
          if [ -f "inventory-service/pom.xml" ]; then
            echo "BACKEND_DIR=inventory-service" >> "$GITHUB_ENV"
          elif [ -f "pom.xml" ]; then
            echo "BACKEND_DIR=." >> "$GITHUB_ENV"
          else
            echo "::error::pom.xml not found at repo root or inventory-service/"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Secondary cache layer — reduces cold-start time when setup-java cache misses
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('pom.xml', 'inventory-service/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and test
        run: |
          set -euo pipefail
          cd "$BACKEND_DIR"
          mvn -U clean verify -Dspring.profiles.active=test -Dtestcontainers.enabled=false
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID }}
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${{ secrets.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET }}

      # Non-blocking — useful for tracking Spring version drift between dependency updates
      - name: Show Spring and Security versions
        run: |
          cd "$BACKEND_DIR"
          mvn -q dependency:list -DincludeGroupIds=org.springframework,org.springframework.security | \
            grep -E 'spring-core|spring-security-core' || true

      - name: Upload JaCoCo coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-${{ github.sha }}
          path: ${{ env.BACKEND_DIR }}/target/site/jacoco/
          retention-days: 30

      - name: Job summary
        if: always()
        run: |
          echo "## Backend Build & Test" >> $GITHUB_STEP_SUMMARY
          echo "- **Coverage artifact:** \`jacoco-html-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Next:** \`2-docker-backend.yml\` builds and scans the Docker image" >> $GITHUB_STEP_SUMMARY