# =============================================================================
# Smart Supply Pro – Documentation Pipeline
#
# Builds and packages all project documentation into the docs-site artifact.
# Triggered after backend or frontend CI succeeds, or on docs-only pushes.
# On success, triggers: 3-deploy-ghpages.yml (publishes to GitHub Pages).
#
# Artifacts consumed: jacoco-html-{SHA}            (from 1-ci-backend.yml, optional)
#                     frontend-coverage-html-{SHA}  (from 5-ci-frontend.yml, optional)
# Artifacts produced: docs-site                    (consumed by 3-deploy-ghpages.yml)
# =============================================================================
name: Docs Pipeline - OpenAPI & Architecture

on:
  workflow_run:
    workflows:
      - "1 Backend CI - Build & Test"
      - "5 Frontend CI - Build & Test"
    types: [completed]
  push:
    branches: [ "main" ]
    paths:
      - 'docs/**'
      - '.github/scripts/docs/**'
      - '.github/workflows/docs-pipeline.yml'

permissions:
  contents: write
  actions: read

# Cancel in-progress builds when a newer commit arrives
concurrency:
  group: docs-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      # Checkout the commit that triggered upstream CI, or HEAD for direct pushes
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      # Supports flat layout (pom.xml + docs/) and monorepo (backend/pom.xml + backend/docs/)
      - name: Detect project root
        id: where
        run: |
          set -euo pipefail
          if [ -f "pom.xml" ] && [ -d "docs" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          elif [ -f "backend/pom.xml" ] && [ -d "backend/docs" ]; then
            echo "dir=backend" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No project root found (expected pom.xml + docs/)"
            exit 1
          fi

      # JaCoCo is only available when triggered after backend CI — absent on docs-only pushes
      - name: Download JaCoCo artifact
        if: >
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.name == '1 Backend CI - Build & Test'
        uses: actions/download-artifact@v8
        with:
          name: jacoco-html-${{ github.event.workflow_run.head_sha }}
          path: ${{ steps.where.outputs.dir }}/target/site/jacoco
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Frontend coverage is only available when triggered after frontend CI
      - name: Download frontend coverage artifact
        if: >
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.name == '5 Frontend CI - Build & Test'
        uses: actions/download-artifact@v8
        with:
          name: frontend-coverage-html-${{ github.event.workflow_run.head_sha }}
          path: ${{ steps.where.outputs.dir }}/target/frontend/coverage
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Pin npm version
        run: |
          npm install -g npm@11.10.1
          echo "npm: $(npm --version)"

      - name: Install ReDoc CLI
        run: npm install -g @redocly/cli

      - name: Install Pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc

      # Install frontend deps so TypeDoc can generate markdown from source
      - name: Install frontend dependencies
        run: |
          [ -d "frontend" ] && cd frontend && npm ci || echo "No frontend directory — skipping"

      - name: Generate TypeDoc markdown
        run: |
          if [ -f "frontend/typedoc.json" ]; then
            cd frontend
            npx typedoc --options typedoc.json || echo "TypeDoc failed — continuing (non-blocking)"
          else
            echo "No frontend/typedoc.json — skipping TypeDoc"
          fi

      - name: Build docs site
        run: |
          PROJECT_DIR="${{ steps.where.outputs.dir }}"
          bash .github/scripts/docs/build-docs.sh "$PROJECT_DIR"

      - name: Upload docs-site artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: ${{ steps.where.outputs.dir }}/target/docs