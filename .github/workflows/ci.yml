name: Inventory Service CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn clean install -DskipTests

      # Login to DockerHub using secrets
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      # Debugging secrets
      - name: Debug Secrets
        run: |
          echo "Username: ${{ secrets.DOCKER_USERNAME }}"
          echo "Password length: ${#{{ secrets.DOCKER_PASSWORD }}}"

      - name: Build Docker image
        run: docker build -t inventory-service:ci .

      # Tag & push image to DockerHub
      - name: Push Docker image
        run: |
          docker tag inventory-service:ci ${{ secrets.DOCKER_USERNAME }}/inventory-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/inventory-service:latest
